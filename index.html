<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR 鳥類剪影對齊跳轉</title>
    <style>
        /* 讓相機畫面滿版 */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; }
        #video-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* UI 提示文字層 */
        #ui-layer {
            position: absolute; top: 5%; left: 0; width: 100%;
            text-align: center; color: white; z-index: 10;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.8);
        }
        h2 { margin: 0 0 10px 0; font-size: 22px; }
        p { margin: 0; font-size: 14px; background: rgba(0,0,0,0.5); display: inline-block; padding: 5px 15px; border-radius: 20px; }

        /* 關鍵：固定在手機畫面正中央的彩色鳥圖片 */
        #bird-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); /* 完美的絕對居中 */
            width: 200px;  /* 調整畫面中央彩色鳥的大小 */
            height: auto;
            z-index: 5;
            opacity: 0.85; /* 帶一點透明度，方便使用者對齊底下的貼紙 */
            pointer-events: none; /* 讓圖片不影響點擊事件 */
            animation: pulse 2s infinite; /* 讓小鳥微微呼吸閃爍，提示感更好 */
        }

        /* 點擊確認按鈕（放在底部） */
        #action-btn {
            position: absolute; bottom: 8%; left: 50%; transform: translateX(-50%);
            padding: 15px 40px; font-size: 18px; font-weight: bold;
            background-color: #003366; color: white; border: 2px solid white;
            border-radius: 30px; cursor: pointer; z-index: 10;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.05); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h2>對齊挑戰</h2>
        <p>移動手機，將彩色鳥重疊於實體剪影貼紙上</p>
    </div>

    <img id="bird-overlay" src="./bird-wings.png" alt="AR Bird">

    <div id="video-container">
        <video id="webcam" autoplay playsinline></video>
    </div>

    <button id="action-btn">完美重疊！解鎖網站</button>

    <script>
        const video = document.getElementById('webcam');
        const button = document.getElementById('action-btn');

        // 1. 啟動手機相機，當作背景
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' }, // 強制使用後鏡頭
                    audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                alert("無法開啟相機，請確保開啟了 HTTPS 連線與相機權限。");
                console.error(err);
            }
        }

        // 2. 點擊按鈕的跳轉邏輯
        button.addEventListener('click', () => {
            // 點擊時可以做個簡單的放大特效，然後跳轉
            button.innerText = "解鎖中...";
            button.style.backgroundColor = "#0066cc";
            
            setTimeout(() => {
                // 換成你想跳轉的目標網址
                window.location.href = "https://www.youtube.com/?app=desktop&hl=zh-tw"; 
            }, 500);
        });

        // 網頁載入後啟動相機
        window.addEventListener('DOMContentLoaded', startCamera);
    </script>
</body>
</html>
